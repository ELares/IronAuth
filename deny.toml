# SPDX-License-Identifier: MIT OR Apache-2.0
#
# Supply-chain policy for IronAuth (https://embarkstudios.github.io/cargo-deny/).
# Mirrors the sibling Iron projects: permissive licenses only, no wildcard
# dependencies, advisories are build failures, crates.io is the only source.
# Every exception added here must carry a reason and an issue reference.

[graph]
all-features = true

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
]
# Scoped exceptions (issue #86): the vetted allowlist HTML sanitizer `ammonia`, the
# security core of safe branding rich text, pulls `cssparser` and its `dtoa-short`
# helper, both Mozilla-authored and MPL-2.0. MPL-2.0 is a weak, file-scoped copyleft
# that imposes no obligation on the rest of the tree; these two crates are used
# unmodified. The exception is pinned to EXACTLY these crates rather than allowing
# MPL-2.0 platform-wide, so no other MPL crate can enter unnoticed.
exceptions = [
  { crate = "cssparser", allow = ["MPL-2.0"] },
  { crate = "dtoa-short", allow = ["MPL-2.0"] },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[advisories]
yanked = "deny"
# Scoped advisory ignore (issue #93). RUSTSEC-2023-0071 ("Marvin Attack") is a
# TIMING side channel in the `rsa` crate's RSA DECRYPTION path (PKCS#1 v1.5
# unpadding). IronAuth uses the `rsa` crate ONLY to GENERATE a day-one RS256
# signing key and export it to PKCS#1 DER (crates/ironauth-jose keygen); it never
# decrypts and never signs with the `rsa` crate. Signing and verification run
# exclusively on `ring`. The vulnerable decryption path is therefore UNREACHABLE
# in this tree. There is no fixed release of `rsa` for this advisory yet, so the
# only options are ignore-with-justification or vendoring keygen; the former is
# correct given the path is unreachable. The dep-review lens MUST re-confirm the
# `rsa` crate is never used to decrypt or sign before this ignore is trusted.
ignore = [{ id = "RUSTSEC-2023-0071", reason = "rsa crate used only for RS256 keygen + DER export (crates/ironauth-jose); never decrypts or signs, so the Marvin decryption-timing path is unreachable. Signing/verification is on ring." }]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
