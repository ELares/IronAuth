# SPDX-License-Identifier: MIT OR Apache-2.0
#
# Supply-chain policy for IronAuth (https://embarkstudios.github.io/cargo-deny/).
# Mirrors the sibling Iron projects: permissive licenses only, no wildcard
# dependencies, advisories are build failures, crates.io is the only source.
# Every exception added here must carry a reason and an issue reference.

[graph]
all-features = true

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[advisories]
yanked = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
