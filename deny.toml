# SPDX-License-Identifier: MIT OR Apache-2.0
#
# Supply-chain policy for IronAuth (https://embarkstudios.github.io/cargo-deny/).
# Mirrors the sibling Iron projects: permissive licenses only, no wildcard
# dependencies, advisories are build failures, crates.io is the only source.
# Every exception added here must carry a reason and an issue reference.

[graph]
all-features = true

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
]
# Scoped exceptions (issue #86): the vetted allowlist HTML sanitizer `ammonia`, the
# security core of safe branding rich text, pulls `cssparser` and its `dtoa-short`
# helper, both Mozilla-authored and MPL-2.0. MPL-2.0 is a weak, file-scoped copyleft
# that imposes no obligation on the rest of the tree; these two crates are used
# unmodified. The exception is pinned to EXACTLY these crates rather than allowing
# MPL-2.0 platform-wide, so no other MPL crate can enter unnoticed.
exceptions = [
  { crate = "cssparser", allow = ["MPL-2.0"] },
  { crate = "dtoa-short", allow = ["MPL-2.0"] },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[advisories]
yanked = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
