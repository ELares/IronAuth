# SPDX-License-Identifier: MIT OR Apache-2.0
#
# IronAuth Cargo virtual workspace. The crate graph mirrors the design seams laid
# down in milestone M1: ironauth-env is the determinism seam (all wall-clock time,
# monotonic time, and entropy access flows through it, enforced by
# scripts/invariant-lints.sh), and ironauth is the single-binary entry point.
# Later M1 issues add ironauth-config (#4), the server skeleton (#5), the
# persistence substrate (#6, #7), the JOSE and signing cores (#8, #9), the
# SSRF-hardened fetcher (#10), and the management API skeleton (#11), each as its
# own crate behind a documented seam.

[workspace]
resolver = "2"
members = [
    "crates/ironauth-env",
    "crates/ironauth",
]

[workspace.package]
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
repository = "https://github.com/ELares/IronAuth"

[workspace.dependencies]
ironauth-env = { path = "crates/ironauth-env", version = "0.1.0" }
getrandom = "0.3"

[workspace.lints.rust]
unsafe_code = "deny"
missing_docs = "warn"

[workspace.lints.clippy]
# Pedantic is the workspace floor; CI promotes warnings to errors with -D warnings.
# Exceptions are granted per item with an inline reason, never blanket-allowed.
pedantic = { level = "warn", priority = -1 }
