#
# Minimal bundled collector: accept OTLP over gRPC from ironauth and print the
# received spans. A real deployment swaps the debug exporter for a backend
# (Jaeger, Tempo, an OTLP gateway), but this proves the trace pipeline end to
# end in the compose stack.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

exporters:
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [debug]
