#
# TLS terminator in front of the IronAuth data plane for the conformance stack.
# It publishes the "op" issuer host over HTTPS with the self-signed cert from
# gen-certs.sh and forwards to ironauth-cert's plain-HTTP data plane on the
# internal network. IronAuth derives the issuer and every endpoint URL from
# public_url (https://op), never from the forwarded Host, so this proxy does not
# need to rewrite anything: it is pure TLS termination plus pass-through.

server {
    listen 443 ssl;
    server_name op;

    ssl_certificate     /etc/nginx/tls/op.crt;
    ssl_certificate_key /etc/nginx/tls/op.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # No client-body cap games: the suite pushes request objects and DCR bodies.
    client_max_body_size 2m;

    location / {
        proxy_pass http://ironauth-cert:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $remote_addr;
        # The OP's own timeouts are short; give the suite's slower flows headroom.
        proxy_read_timeout 30s;
    }
}
