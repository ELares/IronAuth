# SPDX-License-Identifier: MIT OR Apache-2.0
[package]
name = "ironauth-oidc"
version = "0.1.0"
description = "IronAuth OIDC core provider: the authorization endpoint and the authorization_code grant with single-use, binding-checked, revocable codes"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

# Explicit test list: the DB-backed integration tests are gated behind
# required-features = ["testing"] so the DB-free lanes (clippy, msrv, musl,
# cargo check) neither enable the store's test harness nor try to run the DB
# tests. Auto-discovery is off so nothing slips past the gate. The structural
# registry test is database-free and runs on every lane.
autotests = false

[dependencies]
ironauth-env.workspace = true
ironauth-config.workspace = true
ironauth-store.workspace = true
ironauth-jose.workspace = true
# The declarative journey engine (issue #92): the pure artifact model, its load-time
# validator, the predicate evaluator + typed EvalContext, and the compile-to-table
# lowering. The flow engine's ADDITIVE custom-journey path (PR 4) compiles a validated
# journey to a transition table and drives it through the SAME already-factored login /
# mfa / profiling executor cores the built-in journeys use. Pure value logic only (no
# database, clock, or entropy), so it adds no runtime surface of its own.
ironauth-journey.workspace = true
# The WebAuthn Level 3 ceremony core (issue #65): builds the registration and
# authentication option documents and verifies the ceremony responses. The signature
# check inside it is delegated to the ring-backed ironauth-jose core, so this crate
# adds no ring dependency.
ironauth-webauthn.workspace = true
# The foreign password-hash scheme layer (issue #55): the login path verifies an
# imported bcrypt/scrypt/PBKDF2/Argon2/Firebase hash and, on success, rehashes the
# password to the native Argon2id verifier (verify-then-rehash). Only the pure
# `scheme` surface is used here.
ironauth-import.workspace = true
# The per-tenant/per-environment quota fairness engine (issue #50). The data
# plane constructs one enforcer from the [quota] config and spends it on the
# request path, short-circuiting an over-quota scope with a 429; the engine
# itself is a pure, in-memory token-bucket core with no persistence dependency.
ironauth-quota.workspace = true
# The SSRF-hardened outbound fetcher: the ONLY path sector_identifier_uri
# validation reaches the network through. Depending on ironauth-fetch (not an
# HTTP-client crate) keeps scripts/http-audit.sh satisfied.
ironauth-fetch.workspace = true
# The declarative federation connector definitions and the upstream discovery-document
# parser (issue #75, PR A/PR B): the generic OIDC upstream reads a ConnectorDefinition
# and resolves an issuer-form connector's endpoints through ironauth_connector's pure,
# I/O-free discovery parser (which owns the upstream metadata field names, keeping the
# self-discovery lint's generator the single place IronAuth's OWN document is built).
ironauth-connector.workspace = true
# Breached-password screening and the NIST SP 800-63B-4 policy (issue #63): the
# k-anonymity screening providers, the Screener, and the PasswordPolicy evaluator plus
# NFKC normalization the set/change/reset and login paths call. The HIBP provider's only
# outbound path is ironauth-fetch, so http-audit stays satisfied.
ironauth-screening.workspace = true

# The vetted allowlist HTML sanitizer (issue #86): the security core of safe branding
# rich text. Every branding rich-text slot is parsed and reserialized through ammonia's
# minimal allowlist, so only b i strong em u p br and a[href] (https only, forced rel)
# survive and the Casdoor stored-XSS class is closed by construction. The one place raw
# HTML is emitted into a page is the sanitized output of this crate.
ammonia.workspace = true

# Argon2id verification/hashing for the bootstrap login and registration surface
# (issue #20), at OWASP defaults. Salt bytes come from the ironauth-env entropy
# seam, never the crate's own RNG.
argon2.workspace = true

# `tokio` gates axum's `ConnectInfo<SocketAddr>` extractor, which the DCR registration
# endpoint reads for its non-forgeable rate-limit source key (issue #31, FIX 3).
axum = { workspace = true, features = ["form", "query", "json", "tokio"] }
http.workspace = true
serde = { workspace = true }
serde_json.workspace = true
# JSON Schema derivation for the headless flow contract (issue #84): the published
# docs/flow-schema.json is generated from the Flow types themselves via schema_for!,
# so the wire contract can never drift from the code. Already a workspace dependency
# (ironauth-config, ironauth-connector), so no new crate enters the graph.
schemars = { workspace = true }
# Parse the (possibly repeated) RFC 8707 `resource` request parameter (issue #28)
# from a raw query/form body: the same crate axum uses for form/query extraction,
# so no new crate enters the graph.
serde_urlencoded.workspace = true
# URL-safe, no-padding base64 for the PKCE S256 comparison and for decoding a
# token's jti in tests. Already in the tree via ironauth-store; no new crate.
base64.workspace = true
# SHA-256 for the PKCE S256 code_challenge derivation. Pure Rust, permissive,
# already in the tree via ironauth-store; no new crate.
sha2.workspace = true
tracing.workspace = true
# The metrics facade (already in the tree; the server installs the Prometheus
# recorder). Meters authorization-code reuse and redeem faults so a dropped
# revoke or a burst of reuse is visible in aggregate, not just per-request logs.
metrics.workspace = true
# `tokio::time::timeout` bounds the lazy-migration verifier in the orchestrator (issue #56),
# so a verifier that does not self-bound (a future non-webhook impl) cannot stall the login
# path. Only the `time` feature is needed in the library; the server provides the runtime.
tokio = { workspace = true, features = ["time"] }

[features]
default = []
# Enables the ironauth-store real-database harness for the DB-backed integration
# tests (mirrors ironauth-admin's `testing` gate). Adds no runtime surface.
testing = ["ironauth-store/testing"]

[dev-dependencies]
# net + io-util let the #25 client-assertion test stand up an in-process loopback
# HTTP server that serves a client JWK Set through the fetcher's injected dialer.
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "net", "io-util"] }
# The http1 feature (examples/tests only, via dev-dep feature unification) lets the
# RFC 9470 sample resource server example (issue #72) stand up an axum::serve server;
# the published library never enables it.
axum = { workspace = true, features = ["http1"] }
tower = { workspace = true, features = ["util"] }
http-body-util.workspace = true
# Verify tokens end to end through the one hardened verify path.
ironauth-jose = { workspace = true, features = ["test-util"] }
# The WebAuthn HTTP ceremony test acts as a virtual authenticator: it builds the
# CBOR attestationObject / COSE key (ciborium) and signs assertions (jose test-util
# Ed25519), then drives the ceremony endpoints end to end through the router.
ciborium.workspace = true
# Database-free unit tests build an Env and a deterministic entropy source.
ironauth-env = { workspace = true }
# Base64 for building client_secret_basic Authorization headers in the tests.
base64.workspace = true
# SHA-256 lets the session-management test replicate the check_session_iframe's own
# session_state recomputation (issue #39), so it proves the iframe would answer
# `unchanged` while the session is stable and `changed` once its opbs cookie is cleared.
sha2.workspace = true
# The direct-mode attestation test (issue #66 PR B) reads the stamped attestation
# columns off the credential row directly, over the store's test owner pool.
sqlx = { workspace = true }
# A real third-party Rust OAuth 2.0 client, used to prove client_secret_basic and
# client_secret_post interoperate through a mainstream library (issue #20
# acceptance). default-features off drops its bundled reqwest client (the test
# drives the in-process router directly), so the dev-dependency graph stays lean
# and free of any advisory-flagged transitive crate; it builds under MSRV 1.85.
# The sibling OIDC client crate (openidconnect) is intentionally NOT used: it
# transitively depends on the `rsa` crate (RUSTSEC-2023-0071, the Marvin timing
# attack, no fixed version), which the project's cargo-deny supply-chain gate
# rejects, and silencing a key-recovery advisory in an identity provider is not
# acceptable. The literal openidconnect / JS / Python conformance is deferred to
# the M4/M9 certification wave.
oauth2 = { workspace = true }
# The sector-identifier SSRF test drives the hardened fetcher through injected
# resolver/dialer seams, which live behind ironauth-fetch's `test-harness`
# feature.
ironauth-fetch = { workspace = true, features = ["test-harness"] }
# The device-grant no-plaintext-in-logs acceptance test (issue #24) captures the
# tracing output of a full device flow to a buffer and asserts the device_code and
# user_code never appear in it.
tracing-subscriber = { workspace = true, features = ["fmt", "std"] }
# The lazy-migration metrics-presence test (issue #56) installs a Prometheus recorder,
# drives the hook, and asserts the migrated counter, breaker gauge, and latency
# histogram appear in the rendered exposition text.
metrics-exporter-prometheus = { workspace = true }

# Structural exclusion of forbidden flows: the grant-type, response-type, and
# PKCE-method registries cannot express ROPC, authorization-endpoint access
# tokens, or plain PKCE. Database-free, so it runs on every lane (incl. MSRV).
[[test]]
name = "structural"
path = "tests/structural.rs"

# Per-issuer JWKS HTTP surface (issue #19): explicit Cache-Control and ETag, 304
# on a matching If-None-Match, and disjoint issuers and key sets across
# environments. Database-free.
[[test]]
name = "issuer_http"
path = "tests/issuer_http.rs"

# Discovery generated from live config on both well-known forms (issue #18):
# exact issuer-string match, policy-filtered algorithm arrays with the RS256
# floor, the explicit defaults-if-omitted traps, config-driven capability
# toggles, and the config-driven half of the advertised-vs-observed diff harness.
# Database-free and key-free (discovery needs only config, the issuer string, and
# the algorithm policy), so it runs on every lane.
[[test]]
name = "discovery"
path = "tests/discovery.rs"

# The runtime half of the discovery diff harness (issue #18): the LIVE merged
# router (protocol + discovery, as main.rs mounts it) is probed so every
# advertised endpoint is observed as mounted and every served protocol endpoint
# is advertised. Needs a database (it builds the real oidc_router).
[[test]]
name = "discovery_probe"
path = "tests/discovery_probe.rs"
required-features = ["testing"]

# Pairwise subject derivation (issue #19): the one shared derivation returns an
# identical sub across the ID token and UserInfo call sites, and memoization keeps
# an already-derived sub stable. Database-free.
[[test]]
name = "pairwise"
path = "tests/pairwise.rs"

# sector_identifier_uri validation (issue #19): rejects http, rejects documents
# missing a redirect_uri, and blocks SSRF targets through the hardened fetcher.
# Database-free (drives the fetcher through injected resolver/dialer seams).
[[test]]
name = "sector"
path = "tests/sector.rs"

# Full authorization-code flow issuing tokens end to end, single-use, binding
# re-checks, expiry, reuse revocation, and cross-scope denial, over a real
# database (DATABASE_URL); see scripts/with-test-db.sh.
[[test]]
name = "flow"
path = "tests/flow.rs"
required-features = ["testing"]

# The custom (declarative) journey engine path (issue #92, PR 4): a journey compiled from a
# declarative artifact drives end to end through BOTH transports (AC1), reusing the built-in
# login / MFA executor cores; the built-in journeys coexist unchanged. Over a real database
# (DATABASE_URL); see scripts/with-test-db.sh.
[[test]]
name = "flow_custom"
path = "tests/flow_custom.rs"
required-features = ["testing"]

# The byte-equivalence gate for the login journey flip onto the compiled-table engine (issue #92,
# PR 8b): the flipped login journey (subsuming its MFA challenge / enroll and progressive-profiling
# substates) drives through BOTH transports and its rendered flow byte-equals the committed goldens,
# plus the terminal mints a session with the honest amr. Over a real database (DATABASE_URL); see
# scripts/with-test-db.sh.
[[test]]
name = "flow_login_flip"
path = "tests/flow_login_flip.rs"
required-features = ["testing"]

# Adversarial probes for the login flip (issue #92, PR 8b): proves the flipped table engine
# fails closed on a wrong second factor, a spoofed routing signal, a tampered post-primary step
# with no subject, and a forged custom tag on a login row (no session minted in any case). Over a
# real database (DATABASE_URL); see scripts/with-test-db.sh.
[[test]]
name = "flow_login_flip_adversarial"
path = "tests/flow_login_flip_adversarial.rs"
required-features = ["testing"]

# The byte-equivalence gate for the REGISTRATION journey flip (issue #92, PR 8c): the flipped table
# engine reproduces the imperative registration render byte-for-byte (the details create render and
# the closed-mode uniform acknowledgment via the render-override seam), completes with the honest pwd
# amr, folds a resubmit after the ack, and fails closed on a forged custom tag. Over a real database
# (DATABASE_URL); see scripts/with-test-db.sh.
[[test]]
name = "flow_register_flip"
path = "tests/flow_register_flip.rs"
required-features = ["testing"]

# The byte-equivalence gate for the RECOVERY journey flip (issue #92, PR 8d): the embedded recovery
# artifact driven through the compiled-table engine reproduces the imperative `drive_recovery`
# render byte-for-byte (recovery_start + recovery_ack goldens on both transports), plus the
# empty-identifier / wrong-code shape checks, the honest otp-amr completion, and the forged-custom-tag
# fail-closed probe. Over a real database (DATABASE_URL).
[[test]]
name = "flow_recovery_flip"
path = "tests/flow_recovery_flip.rs"
required-features = ["testing"]

# The read only flow inspector (issue #91, PR4): the OBSERVE projection of an existing
# flow, and the ZERO SIDE EFFECT proof (a full database snapshot, byte identical before and
# after a dry run) that neither observe nor a policy dry run writes any row. Over a real
# database (DATABASE_URL).
[[test]]
name = "flow_inspect"
path = "tests/flow_inspect.rs"
required-features = ["testing"]

# Signup forms as data, the flow contract half (issue #87, PR 2): a configured signup field
# materializes on the next created registration flow (immediacy), a submitted value is validated
# TRAIT AUTHORITATIVELY (an empty form rule still enforces the full trait), and each failure
# attaches to the field node under the same generic message id on both transports. Over a real
# database (DATABASE_URL).
[[test]]
name = "flow_signup_fields"
path = "tests/flow_signup_fields.rs"
required-features = ["testing"]

[[test]]
name = "flow_progressive_profiling"
path = "tests/flow_progressive_profiling.rs"
required-features = ["testing"]

# Consent as flow contract nodes (issue #88, PR 1): a consent-required authorize launches the
# Consent flow rendering the client identity and requested scopes; an allow records the grant and
# resumes to issue the code; a deny returns access_denied; both transports render the same node
# set; the bootstrap page stays the cutover-off fallback. Over a real database (DATABASE_URL).
[[test]]
name = "flow_consent"
path = "tests/flow_consent.rs"
required-features = ["testing"]

# The refresh-token grant end to end (issue #21): the graduated rotation policy
# (public rotate every refresh, confidential only past the TTL threshold), HTTP-layer
# reuse detection and family revocation, the offline_access consent rule for web
# clients with the first-party carve-out, and the three per-client consent modes.
# Over a real database (DATABASE_URL).
[[test]]
name = "refresh"
path = "tests/refresh.rs"
required-features = ["testing"]

# The conditional ID-token claims end to end (issue #14): the REQUIRED claims,
# exact nonce echo, honest acr/amr, auth_time emitted only when due and always
# truthful (incl max_age=0 and require_auth_time), and no at_hash/c_hash/azp from
# a token-endpoint ID token. Over a real database (DATABASE_URL).
[[test]]
name = "id_token"
path = "tests/id_token.rs"
required-features = ["testing"]

# The single-use concurrency race: N concurrent exchanges of one code against one
# shared Postgres, exactly one 200 and N-1 invalid_grant.
[[test]]
name = "race"
path = "tests/race.rs"
required-features = ["testing"]

# The OIDC data-plane IDOR probes registered with the #6 harness, over a real
# database.
[[test]]
name = "idor"
path = "tests/idor.rs"
required-features = ["testing"]

# The full register -> login -> consent -> code -> token flow driven end to end
# through the HTTP/protocol path (parsing the HTML forms and posting the fields),
# plus the page hardening assertions. Rust-native, no browser (issue #20).
[[test]]
name = "interactive"
path = "tests/interactive.rs"
required-features = ["testing"]

# Credential-abuse defenses (issue #64): anti-enumeration uniformity across
# login/register/recovery, per-path account-DoS resistance, and closed-registration
# send suppression, driven through the full HTTP path against a real Postgres.
[[test]]
name = "abuse_defenses"
path = "tests/abuse_defenses.rs"
required-features = ["testing"]

# Registration abuse defenses (issue #80): the offline self-contained proof-of-work
# challenge (a naive bot loop blocked with ZERO third-party calls; single-use, expiring,
# context-bound), the disposable-domain block/flag with anti-enumeration uniformity, and the
# waitlist pending-cannot-authenticate gate, driven through the full HTTP path against a real
# Postgres.
[[test]]
name = "registration_abuse"
path = "tests/registration_abuse.rs"
required-features = ["testing"]

# The self-service end-user account API (issue #61): a user lists and revokes their
# OWN sessions, changes their OWN password, and enrolls/lists/removes their OWN
# credentials, always bound to the authenticated subject (a cross-user id is the
# uniform not-found), with the same-origin CSRF check on every state change and the
# last-usable-credential guardrail. Needs a real database (DATABASE_URL).
[[test]]
name = "account"
path = "tests/account.rs"
required-features = ["testing"]

# The self-service connected-apps (remembered-consent) surface (issue #88): a user lists
# their own active grants (auto-grant clients excluded, display metadata enriched),
# revokes one subject-bound (never touching another user's grant to the same client),
# the revoke cascades to the (subject, client) refresh families and is CSRF-guarded and
# audited, and revoked_at is stamped from the manual clock. Needs a real database.
[[test]]
name = "account_consents"
path = "tests/account_consents.rs"
required-features = ["testing"]

# Breached-password screening and 800-63B-4 policy on the set/change surfaces (issue #63):
# a known-breached password is refused on register and change through an injected STUB
# provider (never the real HIBP API), the fail-open/closed provider-failure policy behaves
# per config, and a Unicode password round-trips (NFKC applied once, set/verify consistent).
# Needs a real database (DATABASE_URL).
[[test]]
name = "breached_password"
path = "tests/breached_password.rs"
required-features = ["testing"]

# The TOTP second-factor and recovery-code HTTP surface (issue #69): enrollment
# activates only after a valid current code, a verified code is single-use (a replay
# is the uniform invalid-code error), a recovery code is usable in place of the
# second factor and single-use, regeneration invalidates prior codes, the per-tenant
# factor order changes the orchestration plan across two configs, and the endpoints
# fail closed when TOTP is disabled. Needs a real database (DATABASE_URL).
[[test]]
name = "totp"
path = "tests/totp.rs"
required-features = ["testing"]

# RFC 9470 step-up authentication end to end (issue #72): a per-scope acr floor runs
# the TOTP second factor and issues a fresh acr/auth_time, a missing factor routes to
# enrollment, the per-scope policy is enforced at authorization, at token issuance,
# and on refresh (a lapsed auth-age window triggers step-up), and a session already at
# the floor proceeds. Needs a real database (DATABASE_URL).
[[test]]
name = "step_up"
path = "tests/step_up.rs"
required-features = ["testing"]

# Trusted devices (remember-device 2FA) and the conditional-credential skip end to end
# (issue #71): a completed multi-factor login remembers the device; a subsequent login
# from it skips the second factor with an honest mfa_remembered acr (no fabricated mfa
# amr); revocation is server-side immediate (a replayed cookie fails); a step-up acr
# floor overrides a remembered device; a cross-account or tampered cookie does not skip;
# a password change invalidates trust. Needs a real database (DATABASE_URL).
[[test]]
name = "trusted_devices"
path = "tests/trusted_devices.rs"
required-features = ["testing"]

# The account-recovery subsystem end to end (issue #81): the downgrade invariant (an
# email-OTP recovery cannot remove a passkey without a fresh equal-or-stronger reverify or
# the elapsed delay window), multi-channel notification, cancellation-revokes-the-pending
# recovery, the per-account cooldown, audit completeness, and the risk seam. Needs a real
# database (DATABASE_URL) and drives the injected clock.
[[test]]
name = "recovery"
path = "tests/recovery.rs"
required-features = ["testing"]

# The minimal risk engine end to end (issue #79): a MED signal forces step-up and a LOW
# one does not; the decision record enumerates its signals and is reconstructable from the
# audit trail; a new-device login notifies and the "this wasn't me" path revokes the
# sessions and flags the credentials; a block is indistinguishable from an ordinary
# failure; the engine runs with zero third-party services; each signal (new device,
# impossible travel, velocity flood, suspect IP) is driven. Needs a real database.
[[test]]
name = "risk"
path = "tests/risk.rs"
required-features = ["testing"]

# Third-party risk-signal ingestion endpoint end to end (issue #82, PR 1): a signed
# Security Event Token (JWS) is verified per-source through the JOSE core and ingested; the
# flag-off 404, and every reject case (unknown source, wrong key, wrong algorithm, expired
# SET, malformed claims) is a uniform refusal that ingests nothing; a re-delivery is an
# idempotent no-op. Needs a real database (DATABASE_URL).
[[test]]
name = "risk_signals"
path = "tests/risk_signals.rs"
required-features = ["testing"]

# Signup fraud review queue (issue #82, PR 2): a quarantined user re-consents on every
# authorization and never receives a sensitive scope, and a risky signup is quarantined
# (recoverable) instead of blocked when the flag is on. Needs a real database.
[[test]]
name = "signup_quarantine"
path = "tests/signup_quarantine.rs"
required-features = ["testing"]

# Consent lockdown, unverified-sensitive-scope gate (issue #88, PR 3): an UNVERIFIED
# (quarantined), non-first-party client requesting a SENSITIVE scope is BLOCKED with
# access_denied at the validated redirect_uri (ahead of the recorded-consent fast path), while
# a non-sensitive scope, a first-party client, a verified client, or the gate turned off all
# proceed as before. Needs a real database.
[[test]]
name = "consent_lockdown"
path = "tests/consent_lockdown.rs"
required-features = ["testing"]

# Advanced recovery modes (issue #82, PR 3): admin-approved, trusted-contact, and IDV-gated
# recovery each complete THROUGH the #81 delay window and downgrade invariant; the IDV callback
# is a single-use, case-bound, JOSE-verified signed callback driven by an in-repo fixture
# provider. Needs a real database.
[[test]]
name = "advanced_recovery"
path = "tests/advanced_recovery.rs"
required-features = ["testing"]

# WebAuthn passkey ceremonies end to end (issue #65): the four ceremony endpoints
# driven through the real router by a software authenticator (a CBOR
# attestationObject / COSE key, real Ed25519 assertion signatures). A passkey
# registers for the authenticated user, a discoverable-credential sign-in resolves
# the user and issues a session whose acr is phr, excludeCredentials is populated so
# the same authenticator cannot register twice (database dedupe), and a wrong-origin
# ceremony is refused. Needs a real database (DATABASE_URL).
[[test]]
name = "webauthn_ceremony"
path = "tests/webauthn_ceremony.rs"
required-features = ["testing"]

# WebAuthn Related Origin Requests (issue #67): the GET /.well-known/webauthn
# document is served with the right content type and caching and reflects a config
# change without a restart; a passkey registered on the serving origin asserts from a
# LISTED related origin end to end, while an UNLISTED origin fails with the
# non-enumerating ceremony error. Needs a real database (DATABASE_URL).
[[test]]
name = "webauthn_related_origins"
path = "tests/webauthn_related_origins.rs"
required-features = ["testing"]

# Direct-mode passkey attestation end to end (issue #66 PR B): under attestation
# mode 'direct' with an allow-listed AAGUID and a verified MDS3 root in the cache, a
# packed attestation registers with attestation_verified stamped on the row and a
# subsequent login reaches the attested_passkey acr; a non-allow-listed AAGUID under
# 'direct' is rejected and stamps nothing. Needs a real database (DATABASE_URL).
[[test]]
name = "webauthn_attestation"
path = "tests/webauthn_attestation.rs"
required-features = ["testing"]

# The public invitation-accept endpoint (issue #60): a token-authenticated invitee
# redeems a single-use, expiring, unguessable token to enroll a credential and
# activate the pending-verification user; the redeem is atomic and single-use, a
# forged/expired/redeemed/revoked/cross-tenant token is the uniform not-found, and a
# passkey invitation activates without a password. Needs a real database.
[[test]]
name = "invitations"
path = "tests/invitations.rs"
required-features = ["testing"]

# Secret-based client authentication: client_secret_basic and client_secret_post,
# the registered-method enforcement, and spec-exact invalid_client (issue #20).
[[test]]
name = "client_auth"
path = "tests/client_auth.rs"
required-features = ["testing"]

# Interop: both client-secret methods exercised through the mainstream oauth2
# Rust client crate, including the client_secret_basic form-urlencoding case.
[[test]]
name = "interop"
path = "tests/interop.rs"
required-features = ["testing"]

# PKCE enforcement (S256-only, mandatory, downgrade prevention both ways), exact
# redirect matching with the loopback exception and native-app schemes, and the
# RFC 9207 iss on success and error responses (issue #13). Over a real database.
[[test]]
name = "pkce_redirect"
path = "tests/pkce_redirect.rs"
required-features = ["testing"]

# Legacy response types (id_token, code id_token, none), form_post, and the
# response-mode negotiation, disabled by default and enabled per environment
# (issue #17): spec-exact fragment responses with nonce and c_hash, the
# auto-submitting form_post whose code never enters a URL, and the
# unsupported/invalid_request rejections through the negotiated mode. Over a real
# database with a provisioned signing key.
[[test]]
name = "response_types"
path = "tests/response_types.rs"
required-features = ["testing"]

# prompt (the SET model, prompt=none through the response mode, login/consent/
# select_account/create), max_age re-authentication (including the max_age=0
