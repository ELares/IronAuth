# SPDX-License-Identifier: MIT OR Apache-2.0
#
# The merge gate. Every lane here is required before merge once branch
# protection lists them; scripts/gate.sh runs the locally runnable subset in
# the same order. Lanes: fmt, clippy (pedantic, -D warnings), test, msrv,
# musl static build, cargo-deny, invariant lints (including the conformance
# harness static checks), dash scan, compat matrix.
#
# The OIDF conformance harness (issue #37) is split in two on purpose:
#   - its STATIC half runs in the `invariants` job on every PR, gated by no
#     repository variable, and is a real required check today;
#   - its LIVE half (`conformance-live`) needs an owner-provisioned suite runner.
#     That job always RUNS but is explicitly ADVISORY and named so it cannot be
#     mistaken for a gate: it is not gated by a job-level `if:`, because GitHub
#     reports a skipped job to branch protection as SUCCESS, which would let one
#     unset repository variable turn a required conformance check silently green.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy (pedantic, -D warnings)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # The ironauth-store isolation tests (rls, idor, repository) require a real
    # Postgres. The harness creates a fresh per-run database and provisions the
    # low-privilege application role, so it needs a superuser/owner connection;
    # this service provides one. Without DATABASE_URL those tests fail loudly
    # (never silently skip), so this wiring is what proves isolation against a
    # real database on every run.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # The default 64MB /dev/shm exhausts the Postgres dynamic-shared-memory
        # segments (error 53100) under the growing parallel test suite, where every
        # test spins up an isolated database. Give the container a larger shm.
        options: >-
          --shm-size=1g
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: tests (workspace, all features)
        run: cargo test --workspace --all-features
      - name: doctests
        run: cargo test --workspace --all-features --doc

  msrv:
    name: msrv (1.85)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # rust-toolchain.toml pins 1.97.0 and outranks `rustup default`, which
      # would silently turn this lane into a no-op. RUSTUP_TOOLCHAIN outranks
      # the toolchain file, so the check genuinely runs under 1.85.
      RUSTUP_TOOLCHAIN: "1.85"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-features --all-targets

  musl:
    name: musl static build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install musl target for the pinned toolchain
        # rust-toolchain.toml pins the toolchain cargo actually uses, so the
        # target must be added through rustup (which honors the pin), not via
        # the action (which only equips its own toolchain).
        run: rustup target add x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cargo build --release --target x86_64-unknown-linux-musl -p ironauth
      - name: Verify the binary is static
        run: |
          file target/x86_64-unknown-linux-musl/release/ironauth
          if ldd target/x86_64-unknown-linux-musl/release/ironauth 2>&1 | grep -vq 'not a dynamic executable\|statically linked'; then
            echo "binary is not static" && exit 1
          fi

  deny:
    name: cargo-deny (advisories, licenses, bans, sources)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  invariants:
    name: invariant lints, dash scan, compat matrix
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # This job compiles ironauth-admin and ironauth-config through the
      # openapi-check / config-schema freshness steps; cache the build so those
      # do not pay a cold compile on every run.
      - uses: Swatinem/rust-cache@v2
      # The conformance static checks parse the profile matrix and RENDER the
      # runner's plan config, so they need PyYAML. Pin the interpreter (the
      # hash-pinned requirements are resolved for CPython 3.12 on linux) and
      # install with --require-hashes, so this lane installs exactly the reviewed
      # bits or fails. Without this the deep matrix and plan-config checks would
      # silently take their degraded fallback path and enforce less than they say.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: provision the conformance static-check python deps (hash pinned)
        run: python3 -m pip install --require-hashes -r deploy/conformance/requirements.txt
      - name: invariant lints
        run: scripts/invariant-lints.sh
      - name: query audit (no scoped-table SQL outside the repository module)
        run: scripts/query-audit.sh
      - name: classification lint (every resource type is classified; all three classes used)
        run: scripts/classification-lint.sh
      - name: diagnostics redaction corpus (no secret sentinel can reach a diagnostic record)
        run: scripts/diagnostics-redaction-scan.sh
      - name: canonicalization seam (every identifier comparison routes through the one seam)
        run: scripts/canonicalization-seam.sh
      - name: hashing pool boundary (every request-path hash routes through the admission-controlled pool)
        run: scripts/hashing-pool-boundary.sh
      - name: http audit (no outbound HTTP client outside the fetch dispatcher)
        run: scripts/http-audit.sh
      - name: no M2M metering (no metering/billing/quota hook on the client-credentials path)
        run: scripts/no-m2m-metering.sh
      - name: dash scan
        run: scripts/dash-scan.sh
      - name: discovery scan (no static discovery JSON; generated at serve time)
        run: scripts/discovery-scan.sh
      - name: rfc9700 scan (every OAuth endpoint bound to a conformance test)
        run: scripts/rfc9700-scan.sh
      - name: route audit (reference app calls only documented public endpoints)
        # The standalone TypeScript reference app (packages/reference-app) is a
        # pure client of the public flow API. This audit is the structural
        # guarantee that every network call it makes targets a documented public
        # endpoint: it diffs the app's declared endpoints against the Rust
        # FLOW_*_PATH constants plus the documented public session endpoints, and
        # fails if any module outside the one audited client performs a network
        # call or names a server path or external URL. It is a static check (no
        # Node needed), so it lives in this python lane.
        run: scripts/route-audit.sh
      - name: admin spa route audit (console calls only documented management endpoints)
        # The admin console SPA (packages/admin-spa, issue #90) is a pure client
        # of the PUBLIC management API. This audit is the structural guarantee
        # that every network call it makes funnels through the one generated
        # typed client and targets a path documented in
        # docs/openapi/management.json (plus the allowlisted OIDC public
        # endpoints the PR2 login module needs). It is a static check (no Node
        # needed), so it lives in this python lane alongside the reference-app
        # route audit. The Node driven codegen freshness and build for this app
        # run in the admin-spa job below.
        run: scripts/admin-spa-route-audit.sh
      - name: conformance harness static checks (results gate, matrix, digest pins, plan config, downgrade confinement)
        # THIS is the conformance enforcement that is real today. It is always-on,
        # runner-independent, gated by NO repository variable, and required on
        # every PR: the results-gate unit tests, the profile matrix and compose
        # shape, that every image reference anywhere under deploy/conformance is
        # pinned by digest, that the runner's plan config actually renders from
        # the matrix, that the harness cannot fail open, and that the cert-only
        # downgrades stay out of the shipped default. The LIVE suite drive is a
        # separate lane below and, until an owner provisions the runner, it
        # enforces nothing and does not pretend to.
        run: scripts/conformance-check.sh
      - name: compatibility matrix freshness
        run: |
          scripts/compat-matrix.sh
          git diff --exit-code docs/COMPATIBILITY.md
      - name: config schema freshness
        run: |
          scripts/config-schema.sh
          git diff --exit-code docs/config-schema.json docs/CONFIG.md
      - name: connector schema freshness (definition + capability matrix)
        run: |
          scripts/connector-schema.sh
          git diff --exit-code docs/connector-schema.json docs/capability-matrix.schema.json
      - name: flow schema freshness (flow object schema + message id registry)
        run: |
          scripts/flow-schema.sh
          git diff --exit-code docs/flow-schema.json docs/flow-messages.json
      - name: reference app bindings freshness (generated from the published contract)
        # The reference app's TypeScript types, its schema derived validation
        # constants, and its numeric id to copy map are GENERATED from
        # docs/flow-schema.json and docs/flow-messages.json, so the app and the
        # server cannot diverge on the flow object shape or the message copy.
        # This regenerates them and fails if the committed bindings drift.
        run: scripts/reference-app-bindings.sh
      - name: flow golden corpus freshness (rendered flow shape, all journeys x both transports)
        # The golden corpus LOCKS the rendered flow shape (node set, deterministic order,
        # groups, message ids) for every journey/state on both transports. A breaking change
        # to any journey's rendered flow trips this diff, so it cannot land silently; new
        # journeys or node groups are additive (they add goldens without changing existing ones).
        run: |
          scripts/flow-golden.sh
          git diff --exit-code docs/flow-golden.json
      - name: journey golden-path replay (recorded transcripts vs compiled routing)
        # Re-execute every committed journey transcript against its artifact's compiled routing,
        # the SAME document-order-first-true-guard walk the live engine drives (pinned context,
        # pure evaluator, no database). A version whose routing drifts (a guard edited, a
        # transition added or reordered) makes a recorded transcript diverge and fails here, so
        # behavioral drift between flow versions cannot land silently. The regenerate mode
        # (scripts/journey-replay.sh --regenerate) rewrites the expected outcomes for a reviewable
        # diff when a routing change is deliberate.
        run: scripts/journey-replay.sh
      - name: openapi freshness (served management spec vs committed artifact)
        run: scripts/openapi-check.sh
      - name: governance files present
        # The license and covenant files are trust infrastructure; this lint
        # ensures they cannot be silently removed or renamed.
        run: |
          for f in LICENSE LICENSE-APACHE LICENSE-MIT COVENANTS.md SECURITY.md CONTRIBUTING.md docs/THREAT-MODEL.md docs/WILL-NOT-IMPLEMENT.md; do
            test -s "$f" || { echo "missing required governance file: $f"; exit 1; }
          done
      - name: security.txt is valid and unexpired
        run: |
          python3 - <<'EOF'
          import datetime, re, sys
          text = open('docs/well-known/security.txt', encoding='utf-8').read()
          fields = dict(
              line.split(':', 1) for line in text.splitlines()
              if line.strip() and not line.startswith('#')
          )
          for required in ('Contact', 'Expires'):
              if required not in fields:
                  sys.exit(f'security.txt missing required field: {required}')
          expires = fields['Expires'].strip()
          if not re.match(r'^\d{4}-\d{2}-\d{2}T', expires):
              sys.exit(f'security.txt Expires is not ISO 8601: {expires}')
          when = datetime.datetime.fromisoformat(expires.replace('Z', '+00:00'))
          now = datetime.datetime.now(datetime.timezone.utc)
          if when <= now:
              sys.exit(f'security.txt is expired: {expires}')
          if (when - now).days > 400:
              sys.exit(f'security.txt Expires more than ~13 months out: {expires}')
          print('security.txt: valid, expires', expires)
          EOF

  # The standalone TypeScript reference app (packages/reference-app, issue #85):
  # build and typecheck it so it cannot rot. It is a SEPARATE deployable that
  # runs OUTSIDE the Rust binary, so it is built independently here and is NEVER
  # part of the Rust release pipeline. The build is deliberately minimal: `tsc`
  # over pinned TypeScript, no bundler, no runtime dependency. The route audit
  # and the bindings freshness gate for this app run in the `invariants` job
  # above (they are static python checks that need no Node).
  reference-app:
    name: reference app (tsc build + typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install (pinned toolchain)
        working-directory: packages/reference-app
        run: npm install --no-audit --no-fund
      - name: build and typecheck
        working-directory: packages/reference-app
        # `tsc` typechecks and emits; noEmitOnError is on by default, so a type
        # error fails the build.
        run: npm run build

  # The admin console SPA (packages/admin-spa, issue #90): the repo's first npm
  # prod dependency tree. This job installs from the committed lockfile with
  # `npm ci`, checks the generated management client is fresh against
  # docs/openapi/management.json, typechecks under the strict tsconfig, and runs
  # the Vite build. The route audit for this app is a static python check and
  # runs in the `invariants` job above. Like the reference app this is a SEPARATE
  # deployable, built here and NEVER part of the Rust release pipeline (the
  # in-process serving crate ironauth-admin-ui embeds a committed placeholder so
  # the Rust build needs no Node).
  admin-spa:
    name: admin spa (codegen freshness, typecheck, vite build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install (locked, from package-lock.json)
        working-directory: packages/admin-spa
        run: npm ci --no-audit --no-fund
      - name: management client codegen freshness (generated vs committed)
        # Regenerates management.gen.ts from docs/openapi/management.json and
        # fails if the committed client drifts, so the console and the served
        # management contract cannot diverge.
        run: scripts/admin-spa-bindings.sh
      - name: typecheck (strict)
        working-directory: packages/admin-spa
        run: npm run typecheck
      - name: unit and component tests (vitest, jsdom)
        # The shell's pure logic (single-environment collapse, scope injection,
        # ErrorBody mapping) and its components (the verbatim ErrorBody boundary,
        # the command palette keyboard flow, the RFC 9470 sudo path) under the
        # Node toolchain. Runtime end to end stays staged under issue #323.
        working-directory: packages/admin-spa
        run: npm test
      - name: build (vite, content hashed external assets)
        working-directory: packages/admin-spa
        run: npm run build
      - name: embed freshness (committed embed vs a fresh vite build)
        # Rebuilds the console and fails if the committed embed under
        # crates/ironauth-admin-ui/embedded/ drifts, so a plain cargo build (no
        # Node) always ships the real, current console. The Vite build is byte
        # reproducible, so this diff is stable rather than flaky.
        run: scripts/admin-spa-embed.sh

  # The LIVE OIDF suite drive. Read the name: this job is NOT a merge gate and
  # must NOT be added to branch protection while it is unprovisioned.
  #
  # It deliberately has NO job-level `if:`. A job skipped by an `if:` is reported
  # to branch protection as SUCCESS, so gating a REQUIRED check on
  # `vars.CONFORMANCE_ENABLED` would mean unsetting or typo-ing one repository
  # variable silently turns the conformance gate GREEN. A merge gate that can be
  # skipped into a pass is worse than no gate: it asserts a guarantee it is not
  # providing. So the job always runs and says, out loud and in its own name,
  # whether it is enforcing anything.
  #
  # Today the live suite is NOT provisioned (real image digests, the suite's trust
  # of the OP CA, and the OIDF runner are all owner/infra actions), so this lane
  # cannot enforce and does not pretend to: it prints a NOT ENFORCING banner. The
  # conformance enforcement that IS real today is the always-on static lane in the
  # `invariants` job, which no variable gates.
  #
  # Once an owner provisions the runner and sets CONFORMANCE_ENABLED=true, this
  # job drives the merge-gate profile subset and FAILS CLOSED: run-conformance.sh
  # exits non-zero if the runner is missing, if the selection is empty, if the
  # selector crashed, or on any non-PASS module. It cannot be vacuously green.
  conformance-live:
    name: OIDF conformance live suite (advisory until provisioned; NOT a gate)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Least privilege: nothing here writes.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Report whether this lane is enforcing anything
        id: status
        env:
          ENABLED: ${{ vars.CONFORMANCE_ENABLED }}
        run: |
          set -euo pipefail
          if [ "${ENABLED:-}" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "ENFORCING: the live OIDF suite runs below and fails closed on any non-PASS."
            exit 0
          fi
          echo "enabled=false" >> "$GITHUB_OUTPUT"
          cat <<'BANNER'
          ================================================================
          NOT ENFORCING: conformance suite not provisioned.
          ================================================================
          This job verified NOTHING about OIDC conformance. It is green
          because it had nothing to run, not because the provider conforms.

          Outstanding owner/infra actions (docs/conformance/RUNBOOK.md):
            - resolve the real suite image digests in SUITE_VERSION
              (they are all-zero placeholders that fail closed today);
            - wire the suite's trust of the OP self-signed CA;
            - provide the OIDF runner (run-test-plan.py);
            - set the repository variable CONFORMANCE_ENABLED=true.

          Do NOT add this check to branch protection until it is enabled:
          an advisory check promoted to required is a gate that guarantees
          nothing. The conformance checks that DO enforce on every PR are
          in the `invariants` job (scripts/conformance-check.sh), gated by
          no variable at all.
          BANNER
      # Pin the interpreter and install exactly the reviewed, hash-pinned deps.
      # Without this the runner's own dependencies would be absent and the lane
      # could never drive a plan; run-conformance.sh would then (correctly) go RED
      # rather than pass vacuously, which is why provisioning it here matters.
      - uses: actions/setup-python@v5
        if: ${{ steps.status.outputs.enabled == 'true' }}
        with:
          python-version: "3.12"
      - name: Provision the OIDF runner dependencies (hash pinned)
        if: ${{ steps.status.outputs.enabled == 'true' }}
        run: python3 -m pip install --require-hashes -r deploy/conformance/requirements.txt
      - name: Run the merge-gate profile subset (fails closed)
        if: ${{ steps.status.outputs.enabled == 'true' }}
        # Brings up the pinned stack, seeds the deterministic user, generates each
        # plan config from the matrix, drives the Basic / Config / Dynamic / Form
        # Post plans, and fails on any non-PASS (parse_results.py treats
        # WARNING/REVIEW/FAILED/SKIPPED and unfinished as blocking). It also fails
        # if it cannot drive a plan at all. See docs/conformance/RUNBOOK.md.
        working-directory: deploy/conformance
        run: ./run-conformance.sh --trigger merge-gate --up
      - name: Archive suite logs for certification submission
        if: ${{ always() && steps.status.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: conformance-logs-merge-gate
          path: deploy/conformance/results/
          if-no-files-found: ignore
