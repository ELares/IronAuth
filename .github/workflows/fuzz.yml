# SPDX-License-Identifier: MIT OR Apache-2.0
#
# Scheduled continuous fuzzing of the security-critical parsers and validators.
# The cargo-fuzz targets are nightly-only and live in detached (non-workspace)
# fuzz crates, so they run here on a nightly schedule and on demand rather than
# as a per-PR gate. Every-PR adversarial coverage of the same input space lives
# in the crates' stable regression and property tests (the JOSE CVE corpus, the
# fetcher's adversarial address table), which run in the normal `test` lane.
name: fuzz

on:
  schedule:
    # Nightly, off-peak; arbitrary minute to avoid the top-of-hour herd.
    - cron: "27 4 * * *"
  workflow_dispatch:
    inputs:
      max_total_time:
        description: "Seconds to run each fuzz target"
        default: "300"

permissions:
  contents: read

jobs:
  fuzz:
    name: fuzz ${{ matrix.crate }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - crate: ironauth-jose
            target: verify_jws
          - crate: ironauth-fetch
            target: fetch_validation
          - crate: ironauth-store
            target: redirect_match
          - crate: ironauth-store
            target: canonicalize_identifier
          - crate: ironauth-oidc
            target: flow_submission_parse
          - crate: ironauth-oidc
            target: branding_sanitize
    steps:
      - uses: actions/checkout@v4
      # cargo-fuzz needs a nightly toolchain for the sanitizer build. The
      # repository's rust-toolchain.toml pins a stable version, so the fuzz run
      # sets RUSTUP_TOOLCHAIN to override the file (the same technique the msrv
      # lane uses); cargo-fuzz itself installs and builds fine on stable.
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run ${{ matrix.target }}
        working-directory: crates/${{ matrix.crate }}
        env:
          RUSTUP_TOOLCHAIN: nightly
        run: >-
          cargo fuzz run ${{ matrix.target }} --
          -max_total_time=${{ github.event.inputs.max_total_time || '300' }}
          -timeout=25
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.crate }}
          path: crates/${{ matrix.crate }}/fuzz/artifacts/
          if-no-files-found: ignore
