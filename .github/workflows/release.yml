# SPDX-License-Identifier: MIT OR Apache-2.0
#
# Per-artifact release automation for the ironauth server binary. Trigger:
# push a tag "ironauth-vX.Y.Z" whose version equals crates/ironauth's
# Cargo.toml version (the job verifies and refuses on mismatch). Other
# artifacts (SDKs, SPA) get their own "<artifact>-vX.Y.Z" lanes when they
# land. Produces: a static musl binary, a CycloneDX SBOM, GitHub build
# provenance attestations, a GitHub release with the crate changelog section,
# and a cosign-signed container image on GHCR. First real release validates
# this lane end to end; see docs/RELEASING.md.
name: release

on:
  push:
    tags:
      - "ironauth-v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  verify:
    name: verify tag matches crate version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: tag equals crates/ironauth version
        run: |
          tag_version="${GITHUB_REF_NAME#ironauth-v}"
          crate_version=$(grep -m1 '^version' crates/ironauth/Cargo.toml | cut -d'"' -f2)
          echo "tag=$tag_version crate=$crate_version"
          test "$tag_version" = "$crate_version"

  build:
    name: build, sbom, attest, release
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl -p ironauth
      - name: Generate CycloneDX SBOM
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json --spec-version 1.5
      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/ironauth dist/ironauth-x86_64-linux-musl
          find . -name '*.cdx.json' -not -path './dist/*' -exec cp {} dist/ \;
          cd dist && sha256sum * > SHA256SUMS
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/ironauth-x86_64-linux-musl
      - name: Extract changelog section
        run: |
          version="${GITHUB_REF_NAME#ironauth-v}"
          awk -v ver="$version" '/^## /{p=($0 ~ ver)} p' crates/ironauth/CHANGELOG.md > dist/RELEASE_NOTES.md
          test -s dist/RELEASE_NOTES.md || echo "See crates/ironauth/CHANGELOG.md" > dist/RELEASE_NOTES.md
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file dist/RELEASE_NOTES.md \
            dist/ironauth-x86_64-linux-musl dist/SHA256SUMS dist/*.cdx.json

  image:
    name: container image, signed
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl -p ironauth
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        id: push
        run: |
          version="${GITHUB_REF_NAME#ironauth-v}"
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/ironauth"
          mkdir -p image-build
          cp target/x86_64-unknown-linux-musl/release/ironauth image-build/
          cat > image-build/Dockerfile <<'EOF'
          FROM scratch
          COPY ironauth /ironauth
          USER 65532:65532
          ENTRYPOINT ["/ironauth"]
          EOF
          docker build -t "$image:$version" -t "$image:latest" image-build
          docker push "$image:$version"
          docker push "$image:latest"
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' "$image:$version" | cut -d@ -f2)
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign image (keyless)
        run: cosign sign --yes "${{ steps.push.outputs.image }}@${{ steps.push.outputs.digest }}"
      - name: Attest image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.push.outputs.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
